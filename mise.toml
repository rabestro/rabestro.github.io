[tools]
# --- Core Runtime & Build ---
ruby = "3.3"                   # Required for Jekyll static site generation

# --- Security & Quality ---
pre-commit = "latest"          # Git hooks manager

# --- AI & Automation (Agentic Tools) ---
jq = "latest"                  # JSON processor
yq = "latest"                  # YAML processor (Astro/Starlight and GitHub Actions configs)
gh = "latest"                  # GitHub CLI for PRs and site maintenance
fd = "latest"                  # Fast file finder
"aqua:tealdeer-rs/tealdeer" = "latest" # Quick CLI command reference (tldr)

[tasks.setup]
description = "Setup all project dependencies"
depends = ["setup:bundle", "setup:pre-commit", "setup:tools"]

[tasks."setup:pre-commit"]
description = "Install pre-commit hooks"
run = "pre-commit install"

[tasks."setup:bundle"]
description = "Install Ruby dependencies"
run = "bundle install"
sources = ["Gemfile", "Gemfile.lock"]
# Gemfile.lock is now tracked for reproducibility

[tasks."setup:tools"]
description = "🛠️ Install system and build dependencies (universal-ctags, tree)"
run_windows = """
winget install --id UniversalCtags.UniversalCtags --accept-package-agreements --accept-source-agreements
winget install --id GnuWin32.Tree --accept-package-agreements --accept-source-agreements
"""
run = "brew install universal-ctags tree"

[tasks.dev]
description = "Run Jekyll development server"
depends = ["setup:bundle"]
run = "bundle exec jekyll serve"

[tasks.build]
description = "Build the site for production"
depends = ["setup:bundle"]
env = { JEKYLL_ENV = 'production' }
run = "bundle exec jekyll build --incremental"

[tasks.check]
description = "Run HTML Proofer to check for broken links"
depends = ["build"]
run = """
bundle exec htmlproofer _site --disable-external \
  --ignore-urls '/^http:\\/\\/127.0.0.1/,/^http:\\/\\/0.0.0.0/,/^http:\\/\\/localhost/'
"""

[tasks.update]
description = "Update Ruby gems to latest versions"
run = "bundle update"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf _site .jekyll-cache"
