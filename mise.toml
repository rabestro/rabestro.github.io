[tools]
ruby = "3.3"
gh = "latest"
jq = "latest"                  # JSON processor
yq = "latest"                  # YAML processor
"aqua:SonarSource/sonarqube-cli" = "latest" # SonarQube CLI
fd = "latest"                  # Better find
tldr = "latest"                # Simplified man pages
pre-commit = "latest"

[tasks.setup]
description = "Setup all project dependencies"
depends = ["setup:bundle", "setup:pre-commit"]

[tasks."setup:pre-commit"]
description = "Install pre-commit hooks"
run = "pre-commit install"

[tasks."setup:bundle"]
description = "Install Ruby dependencies"
run = "bundle install"
sources = ["Gemfile", "Gemfile.lock"]
# Gemfile.lock is now tracked for reproducibility

[tasks.dev]
description = "Run Jekyll development server"
depends = ["setup:bundle"]
run = "bundle exec jekyll serve"

[tasks.build]
description = "Build the site for production"
depends = ["setup:bundle"]
run = "JEKYLL_ENV=production bundle exec jekyll build"

[tasks.check]
description = "Run HTML Proofer to check for broken links"
depends = ["build"]
run = "bundle exec htmlproofer _site --disable-external --ignore-urls '/^http:\\/\\/127.0.0.1/,/^http:\\/\\/0.0.0.0/,/^http:\\/\\/localhost/'"

[tasks.update]
description = "Update Ruby gems to latest versions"
run = "bundle update"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf _site .jekyll-cache"
